    <!-- Supabase UMD (globalThis.supabase) MUST load synchronously before the module below — Auth.js / UploadForm.js use createClient from global, not bare imports. Do not remove; build uses root HTML as-is (see vite.config.js / netlify.toml). -->

    <script type="module">
        console.log('upload.html loaded: CDN-FIXED-v1');
        import { uploadFile, saveDocumentToDatabase } from './src/components/UploadForm.js?v=3';
        import { getCurrentUser } from './src/components/Auth.js?v=3';
        import { initAdminMode, shouldBypassPayment } from './src/utils/admin-mode.js';
        
        let currentUser = null;
        let letterText = '';

        function stripMarkdown(text) {
            return text
                .replace(/^#{1,6}\s+/gm, '')
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/\*(.*?)\*/g, '$1')
                .replace(/^-\s+/gm, '• ')
                .trim();
        }

        const DROP_LABEL_DEFAULT = 'Drag & drop your letter here';
        const DROP_LABEL_DRAGOVER = 'Release to add your letter';

        function fileIsAllowed(file) {
            if (!file || !file.name) return false;
            const ext = file.name.includes('.') ? file.name.slice(file.name.lastIndexOf('.')).toLowerCase() : '';
            const allowedExt = ['.pdf', '.jpg', '.jpeg', '.png'];
            if (!allowedExt.includes(ext)) return false;
            const type = (file.type || '').toLowerCase();
            if (!type) return true;
            return type === 'application/pdf' || type === 'image/jpeg' || type === 'image/png';
        }

        function setDropError(message) {
            const el = document.getElementById('fileDropError');
            if (!el) return;
            if (message) {
                el.textContent = message;
                el.style.display = 'block';
            } else {
                el.textContent = '';
                el.style.display = 'none';
            }
        }

        function updateSelectedFileDisplay(file) {
            const el = document.getElementById('fileNameDisplay');
            if (!el) return;
            if (file && file.name) {
                el.style.display = 'block';
                el.textContent = 'Selected: ' + file.name;
            } else {
                el.style.display = 'none';
                el.textContent = '';
            }
        }

        function applySelectedFile(file) {
            const fileInput = document.getElementById('file');
            if (!fileInput) return;
            if (!fileIsAllowed(file)) {
                setDropError('Only PDF, JPG, and PNG files are supported.');
                updateSelectedFileDisplay(null);
                return;
            }
            setDropError('');
            try {
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
            } catch (err) {
                console.error('Could not assign dropped file to input:', err);
                setDropError('Your browser blocked assigning the file. Please use Choose File instead.');
                return;
            }
            updateSelectedFileDisplay(file);
        }

        /** Some apps (e.g. Outlook) expose files via items, not files, until drop. */
        function getFileFromDataTransfer(dataTransfer) {
            if (!dataTransfer) return null;
            if (dataTransfer.files && dataTransfer.files.length > 0) {
                return dataTransfer.files[0];
            }
            if (dataTransfer.items && dataTransfer.items.length > 0) {
                for (let i = 0; i < dataTransfer.items.length; i++) {
                    const item = dataTransfer.items[i];
                    if (item.kind === 'file') {
                        const f = item.getAsFile();
                        if (f) return f;
                    }
                }
            }
            return null;
        }

        let fileDropZoneInitialized = false;

        function initFileDropZone() {
            if (fileDropZoneInitialized) return;
            const fileInput = document.getElementById('file');
            const dropZone = document.getElementById('fileDropZone');
            const label = document.getElementById('fileDropLabel');
            const uploadFormEl = document.getElementById('uploadForm');
            if (!fileInput || !dropZone || !label) return;

            fileDropZoneInitialized = true;

            dropZone.addEventListener('click', () => fileInput.click());

            dropZone.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    fileInput.click();
                }
            });

            dropZone.addEventListener('dragenter', (e) => {
                e.preventDefault();
                if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
                dropZone.classList.add('file-drop-zone--dragover');
                label.textContent = DROP_LABEL_DRAGOVER;
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                const related = e.relatedTarget;
                if (!related || !dropZone.contains(related)) {
                    dropZone.classList.remove('file-drop-zone--dragover');
                    label.textContent = DROP_LABEL_DEFAULT;
                }
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
                dropZone.classList.add('file-drop-zone--dragover');
                label.textContent = DROP_LABEL_DRAGOVER;
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('file-drop-zone--dragover');
                label.textContent = DROP_LABEL_DEFAULT;
                const file = getFileFromDataTransfer(e.dataTransfer);
                if (!file) {
                    setDropError('No file received. Try again or use Choose File.');
                    return;
                }
                applySelectedFile(file);
            });

            if (uploadFormEl) {
                uploadFormEl.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
                });
            }

            fileInput.addEventListener('change', () => {
                const f = fileInput.files[0];
                setDropError('');
                if (!f) {
                    updateSelectedFileDisplay(null);
                    return;
                }
                if (!fileIsAllowed(f)) {
                    setDropError('Only PDF, JPG, and PNG files are supported.');
                    fileInput.value = '';
                    updateSelectedFileDisplay(null);
                    return;
                }
                updateSelectedFileDisplay(f);
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initFileDropZone);
        } else {
            initFileDropZone();
        }
        
        // Check payment status and user authentication
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize admin mode (if active)
            const adminMode = await initAdminMode();
            
            // Check payment status (bypass if admin mode)
            const hasPaid = localStorage.getItem('paid') === 'true';
            if (!hasPaid && !shouldBypassPayment()) {
                alert('Payment required to access response preparation. Redirecting to pricing page...');
                window.location.href = '/pricing.html';
                return;
            }
            
            if (adminMode) {
                console.log('[ADMIN] Payment check bypassed');
            }
            
            // Check if user is logged in
            currentUser = await getCurrentUser();
            if (!currentUser) {
                // Create a mock user for testing
                currentUser = { id: 'test-user-123', email: 'test@example.com' };
                console.log('Using mock user for testing');
            }
            
            // Verify all required elements exist
            const requiredElements = ['uploadForm', 'explanation', 'analysisResults', 'responseLetter', 'responseResults', 'generateResponse', 'downloadPDF', 'downloadDOCX'];
            const missingElements = requiredElements.filter(id => !document.getElementById(id));
            
            if (missingElements.length > 0) {
                console.error('Missing required elements:', missingElements);
                alert('Error: Some required page elements are missing. Please refresh the page.');
                return;
            }

            const generateBtn = document.getElementById('generateResponse');
            if (!generateBtn) {
                console.error('[upload] generateResponse button not found (getElementById returned null)');
            } else {
                generateBtn.addEventListener('click', async () => {
                    console.log('Generate button clicked');
                    const userData = document.getElementById('userData').value;

                    try {
                        showStatus('Generating response letter...');

                        const response = await fetch('/.netlify/functions/generate-response', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                letterText: letterText,
                                userData: userData
                            })
                        });

                        const data = await response.json();

                        const letterContent = data.responseLetter || data.letter;
                        if (letterContent) {
                            const responseElement = document.getElementById('responseLetter');
                            if (responseElement) {
                                if (globalThis.marked?.parse) {
                                    responseElement.innerHTML = globalThis.marked.parse(letterContent);
                                } else {
                                    responseElement.textContent = letterContent;
                                }
                                document.getElementById('responseResults').style.display = 'block';
                                hideStatus();
                            }
                        } else {
                            showStatus('Response generation failed: ' + (data.error || 'Unknown error'));
                        }
                    } catch (error) {
                        showStatus('Response generation failed: ' + error.message);
                    }
                });
            }
        });
        
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                alert('Please login first');
                return;
            }
            
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('Please select a file');
                return;
            }
            
            try {
                showStatus('Uploading file...');
                
                // Upload file to Supabase storage
                const filePath = await uploadFile(file, currentUser.id);
                
                // Save document record to database
                await saveDocumentToDatabase(currentUser.id, file.name, filePath);
                
                showStatus('File uploaded successfully! Extracting text...');
                
                // Extract text based on file type
                if (file.type.startsWith('image/')) {
                    // Use OCR for images
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64Data = e.target.result.split(',')[1];
                        try {
                            const ocrResponse = await fetch('/.netlify/functions/extract-text', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ 
                                    imageData: base64Data,
                                    mimeType: file.type
                                })
                            });
                            
                            const ocrData = await ocrResponse.json();
                            
                            if (ocrData.text) {
                                letterText = ocrData.text;
                                showStatus('Text extracted successfully! Analyzing letter...');
                                await analyzeLetter();
                            } else {
                                showStatus('Failed to extract text from image: ' + (ocrData.error || 'Unknown error'));
                            }
                        } catch (error) {
                            showStatus('OCR failed: ' + error.message);
                        }
                    };
                    reader.readAsDataURL(file);
                    return; // Exit early for images
                } else if (file.type === 'application/pdf' || /\.pdf$/i.test(file.name || '')) {
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64Data = e.target.result.split(',')[1];
                        try {
                            const ocrResponse = await fetch('/.netlify/functions/extract-text', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    imageData: base64Data,
                                    mimeType: 'application/pdf'
                                })
                            });
                            const ocrData = await ocrResponse.json();
                            if (ocrData.text) {
                                letterText = ocrData.text;
                                showStatus('Text extracted! Analyzing...');
                                await analyzeLetter();
                            } else {
                                showStatus('Failed to extract text: ' + (ocrData.error || 'Unknown error'));
                            }
                        } catch (error) {
                            showStatus('Extraction failed: ' + error.message);
                        }
                    };
                    reader.readAsDataURL(file);
                    return;
                } else {
                    letterText = `Document content for ${file.name}. This is a placeholder for document text extraction.`;
                }
                
                await analyzeLetter();
                
            } catch (error) {
                showStatus('Upload failed: ' + error.message);
            }
        });
        
        async function analyzeLetter() {
            try {
                // Check usage limits before proceeding
                const usageResponse = await fetch('/.netlify/functions/track-usage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId: currentUser.id,
                        actionType: 'letter_analysis',
                        documentId: null
                    })
                });
                
                if (!usageResponse.ok) {
                    const usageData = await usageResponse.json();
                    showStatus('Usage limit exceeded: ' + usageData.message);
                    return;
                }
                
                const analysisResponse = await fetch('/.netlify/functions/analyze-letter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: letterText,
                        fileUrl: null,
                        imageUrl: null
                    })
                });
                
                const analysisData = await analysisResponse.json();
                
                if (analysisData.summary || analysisData.explanation) {
                    const explanationElement = document.getElementById('explanation');
                    if (explanationElement) {
                        explanationElement.textContent = analysisData.summary || analysisData.explanation;
                        document.getElementById('analysisResults').style.display = 'block';
                        hideStatus();
                    } else {
                        showStatus('Error: Could not find explanation element');
                    }
                } else {
                    showStatus('Analysis failed: ' + (analysisData.error || 'Unknown error'));
                }
            } catch (error) {
                showStatus('Analysis failed: ' + error.message);
            }
        }
        
        document.getElementById('downloadPDF').addEventListener('click', async () => {
            const responseElement = document.getElementById('responseLetter');
            if (!responseElement) {
                alert('Error: Could not find response letter element');
                return;
            }
            const responseText = stripMarkdown(responseElement.innerText || responseElement.textContent);
            
            try {
                const response = await fetch('/.netlify/functions/generate-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: responseText,
                        fileName: 'response-letter.pdf'
                    })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'response-letter.pdf';
                    a.click();
                    window.URL.revokeObjectURL(url);
                } else {
                    alert('PDF generation failed');
                }
            } catch (error) {
                alert('PDF generation failed: ' + error.message);
            }
        });
        
        document.getElementById('downloadDOCX').addEventListener('click', async () => {
            const responseElement = document.getElementById('responseLetter');
            if (!responseElement) {
                alert('Error: Could not find response letter element');
                return;
            }
            const responseText = stripMarkdown(responseElement.innerText || responseElement.textContent);
            
            try {
                const response = await fetch('/.netlify/functions/generate-docx', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        text: responseText,
                        fileName: 'response-letter.docx'
                    })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'response-letter.docx';
                    a.click();
                    window.URL.revokeObjectURL(url);
                } else {
                    alert('DOCX generation failed');
                }
            } catch (error) {
                alert('DOCX generation failed: ' + error.message);
            }
        });
        
        function showStatus(message) {
            const statusDiv = document.getElementById('uploadStatus');
            const statusText = document.getElementById('statusText');
            statusText.textContent = message;
            statusDiv.style.display = 'block';
        }
        
        function hideStatus() {
            document.getElementById('uploadStatus').style.display = 'none';
        }
    </script>
</body>
</html>
