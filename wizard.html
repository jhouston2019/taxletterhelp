<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      window.SUPABASE_URL = "https://khmyjozungzgfxzvmsca.supabase.co";
      window.SUPABASE_ANON_KEY = "sb_publishable_yPZadaFSXQG2gHpZo2DFlw_BtAr8MQ1";
    </script>
    <title>Add your IRS notice | Tax Letter Defense Pro</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://taxletterdefensepro.com/wizard.html">
    <style>
        html { background: #0f172a; }
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .wrap {
            max-width: 720px;
            width: 94%;
            margin: 0 auto;
            padding: 2.5rem 1rem 4rem;
            box-sizing: border-box;
        }
        .panel {
            background: #fff;
            color: #1e293b;
            border-radius: 16px;
            padding: 2rem 1.75rem;
            box-shadow: 0 4px 24px rgba(0,0,0,.12);
        }
        h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem;
            color: #0f172a;
        }
        .sub { margin: 0 0 1.25rem; color: #64748b; font-size: 0.95rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.35rem; font-size: 0.9rem; }
        textarea {
            width: 100%;
            min-height: 180px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            resize: vertical;
        }
        .drop {
            border: 2px dashed #94a3b8;
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            margin-top: 1rem;
            background: #f8fafc;
            cursor: pointer;
        }
        .drop.drag { border-color: #3b82f6; background: #eff6ff; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.25rem;
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            background: #2563eb;
            color: #fff;
            width: 100%;
        }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }
        #status { margin-top: 1rem; font-size: 0.9rem; color: #b45309; min-height: 1.25rem; }
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .nav-top a { color: #93c5fd; text-decoration: none; font-weight: 600; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="nav-top">
            <strong>Tax Letter Defense Pro</strong>
            <div style="display:flex;gap:1rem;align-items:center;">
                <a href="/dashboard.html">My documents</a>
                <button type="button" id="signOutBtn" style="background:transparent;border:1px solid #475569;color:#e2e8f0;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;">Sign out</button>
            </div>
        </div>
        <div class="panel">
            <h1>Your IRS notice</h1>
            <p class="sub">Paste the full notice text or upload a PDF or image. One analysis runs—your preview is taken directly from the final output.</p>

            <label for="pasteNoticeText">Notice text</label>
            <textarea id="pasteNoticeText" placeholder="Paste letter text here…"></textarea>

            <div class="drop" id="dropZone" tabindex="0" role="button" aria-label="Upload file">
                <div>Drop PDF or image here, or <strong>choose file</strong></div>
                <input type="file" id="fileInput" accept=".pdf,application/pdf,image/jpeg,image/png,image/jpg">
            </div>

            <button type="button" class="btn" id="analyzeBtn" disabled>Continue to preview</button>
            <div id="status" aria-live="polite"></div>
        </div>
    </div>

    <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2?bundle" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        import { getCurrentUser, getAccessToken, signOut } from './src/components/Auth.js';

        const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        const pasteEl = document.getElementById('pasteNoticeText');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusEl = document.getElementById('status');

        let letterText = '';

        function setStatus(msg) { statusEl.textContent = msg || ''; }

        function syncBtn() {
            const pasted = (pasteEl.value || '').trim().length >= 40;
            analyzeBtn.disabled = !pasted && !(letterText && letterText.trim().length >= 40);
        }

        pasteEl.addEventListener('input', () => {
            letterText = pasteEl.value.trim();
            syncBtn();
        });

        document.getElementById('signOutBtn').addEventListener('click', async () => {
            await signOut();
            window.location.href = '/';
        });

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag');
            const f = e.dataTransfer?.files?.[0];
            if (f) handleFile(f);
        });

        fileInput.addEventListener('change', () => {
            const f = fileInput.files?.[0];
            if (f) handleFile(f);
        });

        async function handleFile(file) {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = '/login.html?next=' + encodeURIComponent('/wizard.html');
                return;
            }

            const okTypes = /pdf|jpeg|jpg|png/i.test(file.type || '') || /\.pdf$/i.test(file.name || '');
            if (!okTypes) {
                setStatus('Only PDF, JPG, and PNG are supported.');
                return;
            }

            analyzeBtn.disabled = true;
            setStatus('Extracting text…');

            try {
                if (file.type.startsWith('image/') || file.type === 'application/pdf' || /\.pdf$/i.test(file.name || '')) {
                    const formData = new FormData();
                    formData.append('file', file);
                    const ocrResponse = await fetch('/.netlify/functions/extract-text', {
                        method: 'POST',
                        body: formData,
                    });
                    const raw = await ocrResponse.text();
                    let ocrData;
                    try {
                        ocrData = JSON.parse(raw);
                    } catch {
                        setStatus('Extraction failed. Try pasting the text instead.');
                        analyzeBtn.disabled = false;
                        syncBtn();
                        return;
                    }
                    if (typeof ocrData.text === 'string' && ocrData.text.trim()) {
                        letterText = ocrData.text.trim();
                        pasteEl.value = letterText.slice(0, 120000);
                        syncBtn();
                        setStatus('Text extracted. Review above, then continue.');
                    } else {
                        setStatus((ocrData.error || 'Could not read this file.') + ' Paste the notice text instead.');
                    }
                }
            } catch (err) {
                setStatus(err.message || 'Upload failed.');
            }
            analyzeBtn.disabled = false;
            syncBtn();
        }

        analyzeBtn.addEventListener('click', async () => {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = '/login.html?next=' + encodeURIComponent('/wizard.html');
                return;
            }

            const text = (pasteEl.value || '').trim() || letterText.trim();
            if (text.length < 40) {
                setStatus('Add more notice text (at least a few lines).');
                return;
            }

            const token = await getAccessToken();
            if (!token) {
                window.location.href = '/login.html?next=' + encodeURIComponent('/wizard.html');
                return;
            }

            analyzeBtn.disabled = true;
            setStatus('Generating preview…');

            try {
                const analysisResponse = await fetch('/.netlify/functions/analyze-letter', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: 'Bearer ' + token,
                    },
                    body: JSON.stringify({ text }),
                });

                const analysisText = await analysisResponse.text();
                let parsed;
                try {
                    parsed = JSON.parse(analysisText);
                } catch {
                    setStatus('Analysis failed. Please try again.');
                    analyzeBtn.disabled = false;
                    syncBtn();
                    return;
                }

                if (analysisResponse.status === 401) {
                    window.location.href = '/login.html?next=' + encodeURIComponent('/wizard.html');
                    return;
                }
                if (!analysisResponse.ok) {
                    setStatus(parsed.error || 'Analysis failed.');
                    analyzeBtn.disabled = false;
                    syncBtn();
                    return;
                }

                const jobId = parsed.job_id || parsed.recordId;
                if (!jobId) {
                    setStatus('Missing job id from server.');
                    analyzeBtn.disabled = false;
                    syncBtn();
                    return;
                }

                window.location.href = '/preview.html?job_id=' + encodeURIComponent(jobId);
            } catch (e) {
                setStatus(e.message || 'Request failed.');
                analyzeBtn.disabled = false;
                syncBtn();
            }
        });

        (async function init() {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = '/login.html?next=' + encodeURIComponent('/wizard.html');
                return;
            }
            syncBtn();
        })();
    </script>
</body>
</html>
