<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Documents | Tax Letter Defense Pro</title>
    <meta name="description" content="Your IRS notice sessions and response letters.">
    <link rel="canonical" href="https://taxletterdefensepro.com/dashboard.html">
    <meta property="og:title" content="My Documents | Tax Letter Defense Pro">
    <meta property="og:image" content="https://taxletterdefensepro.com/images/og-image.jpg">
    <meta property="og:url" content="https://taxletterdefensepro.com/dashboard.html">
    <script>
      window.SUPABASE_URL = "https://khmyjozungzgfxzvmsca.supabase.co";
      window.SUPABASE_ANON_KEY = "sb_publishable_yPZadaFSXQG2gHpZo2DFlw_BtAr8MQ1";
    </script>
</head>
<body style="background:#0f172a; color:#e2e8f0; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem 1.25rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #334155;">
        <div style="color:#f5f5f5;"><strong>Tax Letter Defense Pro</strong></div>
        <div style="display:flex; align-items:center; gap:1rem;">
            <span style="color:#93c5fd; font-weight:700; padding:8px 12px;">My Documents</span>
            <a href="/wizard" style="color:#e2e8f0; text-decoration:none; font-weight:600; padding:8px 12px;">New notice</a>
            <button type="button" id="dashSignOut" style="background:transparent; border:1px solid #64748b; color:#e2e8f0; padding:8px 14px; border-radius:6px; cursor:pointer; font-family:inherit;">Sign Out</button>
        </div>
    </nav>

    <div style="width:min(960px, 92%); margin:0 auto; padding:2rem 0 4rem;">
        <h1 style="font-size:1.75rem; margin:0 0 1rem;">My Documents</h1>
        <p style="color:#94a3b8; margin:0 0 2rem;">One row per paid session — your IRS letter and AI response.</p>
        <div id="docList"><p style="color:#94a3b8;">Loading…</p></div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2?bundle"
      }
    }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        import { getCurrentUser, getAccessToken, signOut } from './src/components/Auth.js';

        const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

        document.getElementById('dashSignOut').addEventListener('click', async () => {
            await signOut();
            window.location.href = '/';
        });

        async function downloadPdf(text, fileName) {
            const res = await fetch('/.netlify/functions/generate-pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, fileName: fileName || 'irs-response.pdf' }),
            });
            if (!res.ok) return;
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'irs-response.pdf';
            a.click();
            window.URL.revokeObjectURL(url);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = '/login.html?next=' + encodeURIComponent('/dashboard.html');
                return;
            }
            const tok = await getAccessToken();
            if (!tok) {
                window.location.href = '/login.html?next=' + encodeURIComponent('/dashboard.html');
                return;
            }

            const br = await fetch('/api/billing-status', {
                headers: { Authorization: 'Bearer ' + tok },
            });
            const billing = await br.json().catch(() => ({}));
            if (!br.ok || billing.active !== true) {
                window.location.href = '/pricing.html';
                return;
            }

            const { data: sessions, error: sErr } = await supabase
                .from('paid_sessions')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            const listEl = document.getElementById('docList');
            if (sErr) {
                listEl.innerHTML = '<p style="color:#f87171;">Could not load sessions. Ensure the paid_sessions table exists (see deployment SQL).</p>';
                console.error(sErr);
                return;
            }

            if (!sessions || sessions.length === 0) {
                listEl.innerHTML = `
                    <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:2rem; text-align:center;">
                        <p style="margin:0 0 1rem;">No documents yet.</p>
                        <a href="/pricing.html" style="display:inline-block; background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:white; padding:12px 22px; border-radius:10px; font-weight:700; text-decoration:none;">Prepare My IRS Response →</a>
                    </div>`;
                return;
            }

            const cards = [];
            const pdfTexts = [];
            for (const ps of sessions) {
                const { data: letter } = await supabase
                    .from('tlh_letters')
                    .select('id, notice_type, status, ai_response, created_at')
                    .eq('stripe_session_id', ps.stripe_session_id)
                    .maybeSingle();

                const notice = letter?.notice_type || 'IRS notice';
                const dt = new Date(ps.created_at || letter?.created_at).toLocaleString();
                const hasResponse = !!(letter?.ai_response && String(letter.ai_response).trim());
                const complete = hasResponse || ps.status === 'completed' || letter?.status === 'completed';
                const badge = complete
                    ? '<span style="background:#166534;color:#dcfce7;padding:4px 10px;border-radius:999px;font-size:0.75rem;font-weight:700;">Complete</span>'
                    : '<span style="background:#a16207;color:#fef9c3;padding:4px 10px;border-radius:999px;font-size:0.75rem;font-weight:700;">In Progress</span>';

                pdfTexts.push(hasResponse ? String(letter.ai_response) : null);
                const pdfIdx = pdfTexts.length - 1;
                cards.push(`
                    <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:1.25rem; margin-bottom:1rem;">
                        <div style="display:flex; flex-wrap:wrap; justify-content:space-between; gap:0.75rem; align-items:flex-start;">
                            <div>
                                <div style="font-weight:700; color:#f8fafc;">${escapeHtml(notice)}</div>
                                <div style="font-size:0.85rem; color:#94a3b8; margin-top:0.25rem;">${escapeHtml(dt)}</div>
                                <div style="margin-top:0.5rem;">${badge}</div>
                            </div>
                            <div style="display:flex; flex-wrap:wrap; gap:0.5rem;">
                                <a href="/wizard" style="background:#334155;color:white;padding:10px 16px;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.9rem;">View / Continue</a>
                                ${hasResponse ? `<button type="button" class="dl-pdf" data-idx="${pdfIdx}" style="background:#0ea5e9;color:white;padding:10px 16px;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.9rem;">Download PDF</button>` : ''}
                            </div>
                        </div>
                    </div>
                `);
            }
            listEl.innerHTML = cards.join('');

            listEl.querySelectorAll('.dl-pdf').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const i = Number(btn.getAttribute('data-idx'));
                    const t = pdfTexts[i];
                    if (t) downloadPdf(t, 'irs-response.pdf');
                });
            });
        });

        function escapeHtml(s) {
            if (!s) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
