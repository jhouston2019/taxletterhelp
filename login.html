<body style="background:#0f172a; color:#ffffff; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; border-bottom: 2px solid #334155;">
        <div style="color: #f5f5f5;"><strong>Tax Letter Defense Pro</strong></div>
        <div>
            <a href="/wizard" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Wizard</a> |
            <a href="/dashboard.html" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Dashboard</a> |

        </div>

    <div style="width:min(1120px, 92%); margin-inline:auto; padding:2rem 0;">
        <div style="max-width:500px; margin:2rem auto; padding:2rem; background:#ffffff; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
            <h2 style="text-align:center; margin-bottom:2rem; color:#2d3748; font-size:1.8rem;">Sign in with email</h2>
            <p style="color:#64748b; font-size:0.95rem; margin-bottom:1.25rem;">We’ll email you a secure magic link. No password to remember.</p>
            <form id="loginForm">
                <div style="margin-bottom:1.5rem;">
                    <label for="email" style="display:block; margin-bottom:0.5rem; font-weight:bold; color:#2d3748;">Email</label>
                    <input type="email" id="email" name="email" required style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-family:'Inter',sans-serif; font-size:1rem; background:#ffffff; color:#2d3748;">
                </div>
                <button type="submit" style="background:#334155; color:white; padding:14px 28px; border:none; border-radius:10px; cursor:pointer; font-family:'Inter',sans-serif; font-size:1rem; font-weight:600; width:100%;">Email me a login link</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; color:#2d3748;">
                Need access? <a href="/pricing.html" style="color:#1d4ed8; text-decoration:none;">View pricing</a>

    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2?bundle"
      }
    }
    </script>
    <script type="module">
        import { signInWithMagicLink } from './src/components/Auth.js';
        
        function nextParam() {
            const p = new URLSearchParams(window.location.search).get('next');
            if (!p) return '/wizard';
            try {
                return decodeURIComponent(p);
            } catch {
                return '/wizard';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const redirectTo = window.location.origin + nextParam();
            const { error } = await signInWithMagicLink(email, { redirectTo });
            if (error) {
                alert('Could not send link: ' + error.message);
            } else {
                alert('Check your email for the login link. You can close this page.');
            }
        });
    </script>
</body>
