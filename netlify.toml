[build]
  command = ""
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Netlify serves existing static files (e.g. upload.html) before SPA fallbacks.
# upload.html includes the Supabase CDN script before <script type="module">; keep that order.

[[redirects]]
  from = "/account-setup"
  to = "/account-setup.html"
  status = 200

[[redirects]]
  from = "/wizard"
  to = "/wizard.html"
  status = 200

# Preview-first upload entry (serves wizard with flow flag; no backend change)
[[redirects]]
  from = "/analysis-preview"
  to = "/wizard.html?flow=preview"
  status = 200

[[redirects]]
  from = "/upload"
  to = "/wizard"
  status = 301

[[redirects]]
  from = "/app"
  to = "/wizard"
  status = 301

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/result/:job_id"
  to = "/result.html?job_id=:job_id"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/payment"
  to = "/payment.html"
  status = 200

[[redirects]]
  from = "/recover"
  to = "/recover.html"
  status = 200

[[redirects]]
  from = "/cancel"
  to = "/cancel.html"
  status = 200

[[redirects]]
  from = "/account"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/api/create-session-from-stripe"
  to = "/.netlify/functions/create-session-from-stripe"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

[[redirects]]
  from = "/api/auth/create-session-from-stripe"
  to = "/.netlify/functions/create-session-from-stripe"
  status = 200

[[redirects]]
  from = "/api/verify-payment"
  to = "/.netlify/functions/verify-payment"
  status = 200

[[redirects]]
  from = "/api/recover-payment-state"
  to = "/.netlify/functions/recover-payment-state"
  status = 200

[[redirects]]
  from = "/api/billing-status"
  to = "/.netlify/functions/billing-status"
  status = 200

[[redirects]]
  from = "/api/usage"
  to = "/.netlify/functions/usage"
  status = 200

[[redirects]]
  from = "/api/send-receipt"
  to = "/.netlify/functions/send-receipt"
  status = 200

[[redirects]]
  from = "/api/get-stripe-session"
  to = "/.netlify/functions/get-stripe-session"
  status = 200

[[redirects]]
  from = "/api/create-account-from-stripe"
  to = "/.netlify/functions/create-account-from-stripe"
  status = 200

# Ensure sitemap and robots are directly accessible
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# Catch-all redirect for single-page app behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[functions.extract-text]
  timeout = 26

[functions.analyze-letter]
  timeout = 26

[functions.analyze-letter-preview]
  timeout = 26

[functions.generate-response]
  timeout = 26

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prevent caching on sitemap and robots
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
