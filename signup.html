<head>

    <script>
      window.SUPABASE_URL = "https://khmyjozungzgfxzvmsca.supabase.co";
      window.SUPABASE_ANON_KEY = "sb_publishable_yPZadaFSXQG2gHpZo2DFlw_BtAr8MQ1";

</head>
<body style="background:#0f172a; color:#ffffff; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; border-bottom: 2px solid #334155;">
        <div style="color: #f5f5f5;"><strong>Tax Letter Defense Pro</strong></div>
        <div>
            <a href="/pricing.html" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px;">Pricing</a> |
            <a href="/login.html" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px;">Login</a>
        </div>
    </nav>

    <div style="width:min(1120px, 92%); margin-inline:auto; padding:2rem 0;">
        <div style="max-width:500px; margin:2rem auto; padding:2rem; background:#ffffff; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
            <h2 style="text-align:center; margin-bottom:2rem; color:#2d3748; font-size:1.8rem;">Get started</h2>
            <p style="color:#64748b; font-size:0.95rem; margin-bottom:1.25rem;">Enter your email — we’ll send a magic link. After purchase, you’ll use the same email-based sign-in.</p>
            <form id="signupForm">
                <div style="margin-bottom:1.5rem;">
                    <label for="email" style="display:block; margin-bottom:0.5rem; font-weight:bold; color:#2d3748;">Email</label>
                    <input type="email" id="email" name="email" required style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-size:1rem;">
                </div>
                <button type="submit" style="background:#334155; color:white; padding:14px 28px; border:none; border-radius:10px; cursor:pointer; font-size:1rem; font-weight:600; width:100%;">Email me a link</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; color:#2d3748;">
                Already have an account? <a href="/login.html" style="color:#1d4ed8; text-decoration:none;">Login</a>
            </p>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2?bundle"
      }
    }
    </script>
    <script type="module">
        import { signInWithMagicLink } from './src/components/Auth.js';
        
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const { error } = await signInWithMagicLink(email, {
                redirectTo: window.location.origin + '/app'
            });
            if (error) {
                alert('Could not send link: ' + error.message);
            } else {
                alert('Check your email to complete sign-up.');
            }
        });
    </script>
