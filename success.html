<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment confirmed | Tax Letter Defense Pro</title>
    <meta name="robots" content="noindex, nofollow">
    <script>
      window.SUPABASE_URL = "https://khmyjozungzgfxzvmsca.supabase.co";
      window.SUPABASE_ANON_KEY = "sb_publishable_yPZadaFSXQG2gHpZo2DFlw_BtAr8MQ1";
    </script>
    <style>
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
            font-family:'Inter',system-ui,sans-serif; background:#f8fafc; color:#64748b; }
        .box { text-align:center; padding:2rem; }
        .spin { width:40px; height:40px; border:3px solid #e2e8f0; border-top-color:#3b82f6;
            border-radius:50%; animation:spin 0.9s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="spin" aria-hidden="true"></div>
        <p style="margin:0; font-size:1rem;">Confirming payment…</p>
    </div>
    <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2?bundle" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';

        const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

        const params = new URLSearchParams(window.location.search);
        const session_id = params.get("session_id");

        if (!session_id) {
            document.body.innerText = "Missing session.";
            throw new Error("Missing session_id");
        }

        const { data: { session } } = await supabase.auth.getSession();
        const token = session?.access_token;

        if (!token) {
            window.location.href = "/login";
            throw new Error("No auth");
        }

        await fetch("/.netlify/functions/verify-payment", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ session_id })
        });

        let job = null;

        for (let i = 0; i < 10; i++) {
            const { data } = await supabase
                .from("tax_letter_jobs")
                .select("id")
                .eq("stripe_session_id", session_id)
                .maybeSingle();

            if (data) {
                job = data;
                break;
            }

            await new Promise(r => setTimeout(r, 1000));
        }

        if (!job) {
            document.body.innerText = "Finalizing your result… please refresh.";
            throw new Error("Webhook delay");
        }

        window.location.href = `/result/${job.id}`;
    </script>
</body>
</html>
