<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting… | Tax Letter Defense Pro</title>
    <meta name="robots" content="noindex, nofollow">
    <script>
      window.SUPABASE_URL = "https://khmyjozungzgfxzvmsca.supabase.co";
      window.SUPABASE_ANON_KEY = "sb_publishable_yPZadaFSXQG2gHpZo2DFlw_BtAr8MQ1";
    </script>
</head>
<body style="background:#f8fafc; color:#64748b; font-family:'Inter',sans-serif; margin:0; padding:2rem; text-align:center;">
    <p style="margin:0;">Opening app…</p>

    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2?bundle"
      }
    }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        import { initAdminMode, shouldBypassPayment } from './src/utils/admin-mode.js';

        const params = new URLSearchParams(window.location.search);
        const checkoutSessionId = params.get('session_id');

        async function run() {
            await initAdminMode();
            if (shouldBypassPayment()) {
                window.location.replace('/app');
                return;
            }

            const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
            try {
                if (checkoutSessionId) {
                    const sessionRes = await fetch('/api/auth/create-session-from-stripe', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: checkoutSessionId }),
                    });
                    const sessionJson = await sessionRes.json().catch(() => ({}));
                    if (sessionJson.token_hash) {
                        const { error: otpErr } = await supabase.auth.verifyOtp({
                            token_hash: sessionJson.token_hash,
                            type: 'magiclink',
                        });
                        if (otpErr) console.error('verifyOtp', otpErr);
                    }
                }
            } catch (e) {
                console.error(e);
            } finally {
                window.location.replace('/app');
            }
        }

        run();
    </script>
</body>
</html>
