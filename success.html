<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirming payment… | Tax Letter Defense Pro</title>
    <meta name="robots" content="noindex, nofollow">
    <script>
      window.SUPABASE_URL = "https://khmyjozungzgfxzvmsca.supabase.co";
      window.SUPABASE_ANON_KEY = "sb_publishable_yPZadaFSXQG2gHpZo2DFlw_BtAr8MQ1";
    </script>
</head>
<body style="background:#f8fafc; color:#0f172a; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; border-bottom:2px solid #334155; align-items:center;">
        <div style="color:#f5f5f5;"><strong>Tax Letter Defense Pro</strong></div>
    </nav>

    <main>
        <div style="width:min(1120px, 92%); margin-inline:auto; padding:2rem 0;">
            <div id="verifying-payment" style="text-align:center; padding:3rem 1rem;">
                <div style="border:4px solid #f3f3f3; border-top:4px solid #3b82f6; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite; margin:0 auto 1rem;"></div>
                <p style="color:#64748b; font-size:1.1rem;">Confirming your payment and signing you in…</p>
            </div>

            <div id="payment-error" style="display:none; max-width:560px; margin:0 auto; text-align:center;">
                <div style="background:#fee2e2; border:2px solid #ef4444; border-radius:12px; padding:2rem;">
                    <h2 style="color:#991b1b;">We couldn’t finish sign-in</h2>
                    <p id="payment-error-msg" style="color:#7f1d1d;">Try <a href="/recover">recovery</a> or return to <a href="/pricing">pricing</a>.</p>
                </div>
            </div>
        </div>
    </main>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2?bundle"
      }
    }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        import { initAdminMode, shouldBypassPayment } from './src/utils/admin-mode.js';

        const params = new URLSearchParams(window.location.search);
        const checkoutSessionId = params.get('session_id');

        const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

        function showHardFail(message) {
            document.getElementById('verifying-payment').style.display = 'none';
            document.getElementById('payment-error').style.display = 'block';
            const el = document.getElementById('payment-error-msg');
            if (el && message) el.textContent = message;
        }

        async function run() {
            await initAdminMode();

            if (shouldBypassPayment()) {
                window.location.replace('/upload.html');
                return;
            }

            if (!checkoutSessionId) {
                showHardFail('Missing session. Return to pricing to try again.');
                return;
            }

            const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

            const sessionRes = await fetch('/.netlify/functions/create-session-from-stripe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: checkoutSessionId }),
            });
            const sessionJson = await sessionRes.json().catch(() => ({}));
            if (!sessionRes.ok || !sessionJson.token_hash) {
                console.error('create-session-from-stripe', sessionRes.status, sessionJson);
                showHardFail('Could not start your session. Try recovery or pricing.');
                return;
            }

            const { data: otpData, error: otpErr } = await supabase.auth.verifyOtp({
                token_hash: sessionJson.token_hash,
                type: 'magiclink',
            });
            if (otpErr || !otpData?.session) {
                console.error('verifyOtp', otpErr);
                showHardFail('Email sign-in could not be completed. Try the link from your email or recovery.');
                return;
            }

            const { data: { session }, error: sessErr } = await supabase.auth.getSession();
            if (sessErr || !session?.access_token) {
                console.error('getSession', sessErr);
                showHardFail('No active session after sign-in. Please try again.');
                return;
            }

            const authHeader = {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${session.access_token}`,
            };

            let done = false;
            for (let i = 0; i < 8; i++) {
                const v = await fetch('/api/verify-payment', {
                    method: 'POST',
                    headers: authHeader,
                    body: JSON.stringify({ session_id: checkoutSessionId }),
                });
                const raw = await v.text();
                let data;
                try {
                    data = JSON.parse(raw);
                } catch {
                    showHardFail('Verification failed. Try again or contact support.');
                    return;
                }

                if (v.status === 401 || v.status === 403) {
                    showHardFail(data.error === 'Forbidden' ? 'Access denied for this payment.' : 'Not authorized.');
                    return;
                }

                if (v.status >= 500) {
                    await sleep(600 * (i + 1));
                    continue;
                }

                if (data.success === true && data.pending === false) {
                    done = true;
                    break;
                }
                if (data.success === true && data.pending === true) {
                    await sleep(600 * (i + 1));
                    continue;
                }

                await sleep(600 * (i + 1));
            }

            if (!done) {
                showHardFail('Payment verification timed out. Use recovery or try again in a moment.');
                return;
            }

            window.location.replace('/app');
        }

        run().catch((e) => {
            console.error(e);
            showHardFail('Something went wrong.');
        });
    </script>
</body>
</html>
