    <style>
        body {
            margin: 0;

        #loading { color: #8a9ab5; }
        a { color: #4a9eff; font-weight: 600; }
        .result-pro-disclaimer {
            font-size: 13px;
            color: #6a7a95;

            margin-top: 32px;

        .result-letter-preview-wrap {
            position: relative;
            border-radius: 12px;
            overflow: hidden;

            font-family: Georgia, serif;

            filter: blur(5px);
            user-select: none;
            pointer-events: none;
            max-height: none;
        }
        .result-letter-preview-fade {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 55%;
            background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.96));
            pointer-events: none;
        }
        .result-cta {
            text-align: center;
            padding: 1.25rem;
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;

        .result-cta-lead {
            margin: 0 0 0.75rem;

        }
        .result-cta-btn {
            display: inline-block;
            background: #4a9eff;

        .result-cta-btn:disabled { opacity: 0.7; cursor: not-allowed; }

<body>
    <nav style="
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 24px;

      align-items: center;
      justify-content: space-between;
    ">
      <span style="font-weight:700;color:#4a9eff;font-size:16px;">

      <a href="/dashboard.html" style="
        color: #8a9ab5;

    <div class="wrap">
        <h1>Full response</h1>
        <p id="loading">Loading…</p>
        <article id="full" style="display:none;">
            <div class="card" id="analysis">
                <h2>Letter analysis</h2>
                <div id="analysisBody" class="card-body-pre"></div>
            </div>
            <div class="card" id="strategy">
                <h2>Strategy</h2>
                <div id="strategyBody" class="card-body-pre"></div>
            </div>
            <div class="card" id="letter">
                <h2>IRS Response Letter</h2>
                <div id="letterUnlockedWrap" style="display:none;">
                    <div id="letterBodyFull" class="card-body-pre"></div>
                </div>
                <div id="downloadButtons" style="display:none; margin-top:20px; gap:12px; flex-wrap: wrap;">
                    <button type="button" id="downloadTxtBtn" style="
                      background:#4a9eff; color:#fff; border:none;
                      padding:12px 24px; border-radius:8px;
                      font-weight:600; cursor:pointer; font-size:14px;">
                      ⬇ Download as Text
                    </button>
                    <button type="button" id="downloadWordBtn" style="
                      background:rgba(255,255,255,0.08);
                      color:#e8edf5;
                      border:1px solid rgba(255,255,255,0.2);
                      padding:12px 24px; border-radius:8px;
                      font-weight:600; cursor:pointer; font-size:14px;">
                      ⬇ Download as Word (.doc)
                    </button>
                </div>
                <div id="letterLockedWrap" style="display:none;">
                    <div class="result-letter-preview-wrap">
                        <div id="letterPreviewText" class="result-letter-preview-content"></div>
                        <div class="result-letter-preview-fade" aria-hidden="true"></div>
                    </div>
                    <div class="result-cta">
                        <p class="result-cta-lead">Unlock your full letter — $29</p>
                        <button type="button" class="result-cta-btn" id="resultPayBtn">Get Your Letter — $29</button>
                        <p class="result-cta-err" id="resultPayErr"></p>
                    </div>
                </div>
                <div id="letterPendingWrap" style="display:none;">
                    <p style="color:#8a9ab5;margin:0;">Your letter is still being finalized. Refresh in a moment.</p>
                </div>
            </div>
            <p class="result-pro-disclaimer">Have questions about your response? Consider consulting a licensed tax professional or CPA.</p>
        </article>
    </div>
    <script type="importmap">
    { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2?bundle" } }
    </script>
    <script type="module">
        import { getAccessToken } from '/src/components/Auth.js';

        function getJobIdFromLocation() {
            const q = new URLSearchParams(window.location.search).get('job_id');
            if (q) return q;
            const parts = window.location.pathname.split('/').filter(Boolean);
            if (parts.length >= 2 && parts[0] === 'result') return parts[1];
            const last = parts[parts.length - 1];
            if (last && !/\.html$/i.test(last)) return last;
            return null;
        }

        const jobId = getJobIdFromLocation();

        const loading = document.getElementById('loading');
        const full = document.getElementById('full');

        function analysisTextFromData(data) {
            const a = data.analysis_json;
            if (!a) return data.analysis_summary || '—';
            if (typeof a.analysisOutput === 'string') return a.analysisOutput;
            const parts = [];
            if (a.notice_type) parts.push('Notice type: ' + a.notice_type);
            if (a.primary_issue) parts.push('Primary issue: ' + a.primary_issue);
            if (a.tax_year) parts.push('Tax year: ' + a.tax_year);
            if (a.irs_amount) parts.push('IRS claimed amount: ' + a.irs_amount);
            if (a.summary) parts.push('\n' + a.summary);
            if (a.analysis_summary) parts.push('\n' + a.analysis_summary);
            return parts.join('\n') || data.analysis_summary || '—';
        }

        function strategyTextFromData(data) {
            if (!data.strategy_json) return '—';
            const s = data.strategy_json;
            if (typeof s === 'string') return s;
            const parts = [];
            if (s.tone) parts.push('Tone: ' + s.tone);
            if (s.goal) parts.push('Goal: ' + s.goal);
            if (s.approach) parts.push('Approach: ' + s.approach);
            if (s.additionalContext)
                parts.push('Additional context: ' + s.additionalContext);
            return parts.join('\n') || JSON.stringify(s, null, 2);
        }

        function escapeHtmlForDoc(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function downloadTxt() {
            const text = document.getElementById('letterBodyFull').textContent;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'irs-response-letter.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadWord() {
            const text = document.getElementById('letterBodyFull').textContent;
            const safe = escapeHtmlForDoc(text);
            const html = `
      <html xmlns:o="urn:schemas-microsoft-com:office:office"
        xmlns:w="urn:schemas-microsoft-com:office:word"
        xmlns="http://www.w3.org/TR/REC-html40">
        <head><meta charset="utf-8"><title>IRS Response Letter</title></head>
        <body><pre style="font-family:Times New Roman;font-size:12pt;
          line-height:1.8;">${safe}</pre></body>
      </html>`;
            const blob = new Blob([html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'irs-response-letter.doc';
            a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('downloadTxtBtn').addEventListener('click', downloadTxt);
        document.getElementById('downloadWordBtn').addEventListener('click', downloadWord);

        function applyUnlockedLetter(data) {
            document.getElementById('analysisBody').textContent = analysisTextFromData(data) || '—';
            document.getElementById('strategyBody').textContent = strategyTextFromData(data);
            const letter = data.letter_full || '';
            const dl = document.getElementById('downloadButtons');
            if (letter) {
                document.getElementById('letterBodyFull').textContent = letter;
                document.getElementById('letterUnlockedWrap').style.display = 'block';
                document.getElementById('letterLockedWrap').style.display = 'none';
                document.getElementById('letterPendingWrap').style.display = 'none';
                dl.style.display = 'flex';
            } else {
                document.getElementById('letterUnlockedWrap').style.display = 'none';
                document.getElementById('letterLockedWrap').style.display = 'none';
                document.getElementById('letterPendingWrap').style.display = 'block';
                dl.style.display = 'none';
            }
        }

        function applyLockedLetter(data) {
            document.getElementById('analysisBody').textContent = analysisTextFromData(data) || '—';
            document.getElementById('strategyBody').textContent = strategyTextFromData(data);
            document.getElementById('letterPreviewText').textContent = data.preview_text || 'Preview not available yet.';
            document.getElementById('letterUnlockedWrap').style.display = 'none';
            document.getElementById('letterLockedWrap').style.display = 'block';
            document.getElementById('letterPendingWrap').style.display = 'none';
            document.getElementById('downloadButtons').style.display = 'none';
        }

        async function wireCheckout(token) {
            const btn = document.getElementById('resultPayBtn');
            const errEl = document.getElementById('resultPayErr');
            btn.addEventListener('click', async () => {
                errEl.textContent = '';
                btn.disabled = true;
                try {
                    const res = await fetch('/.netlify/functions/create-checkout-session', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            Authorization: 'Bearer ' + token,
                        },
                        body: JSON.stringify({ job_id: jobId, plan: 'single' }),
                    });
                    const data = await res.json();
                    if (data.url) window.location.href = data.url;
                    else throw new Error(data.error || data.details || 'No checkout URL');
                } catch (e) {
                    errEl.textContent = e.message || 'Payment setup failed.';
                    btn.disabled = false;
                }
            });
        }

        function scrollToHash() {
            const h = window.location.hash;
            if (!h) return;
            const el = document.querySelector(h);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        if (!jobId) {
            loading.textContent = 'Not found.';
        } else {
            const tok = await getAccessToken();
            if (!tok) {
                window.location.href = '/login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search);
            } else {
                const res = await fetch(
                    '/.netlify/functions/get-tax-letter-job?job_id=' + encodeURIComponent(jobId),
                    { headers: { Authorization: 'Bearer ' + tok } }
                );

                if (res.status === 401) {
                    window.location.href = '/login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search);
                    throw new Error('auth');
                }

                if (res.status === 404) {
                    loading.textContent = 'Letter not found.';
                    throw new Error('notfound');
                }

                const data = await res.json().catch(() => ({}));

                loading.style.display = 'none';

                if (!res.ok || data.success === false) {
                    loading.style.display = 'block';
                    loading.textContent = data.error || 'Could not load this letter.';
                } else {
                    const unlocked = data.is_unlocked === true || data.unlocked === true;

                    if (unlocked) {
                        applyUnlockedLetter(data);
                    } else {
                        applyLockedLetter(data);
                        await wireCheckout(tok);
                    }
                    full.style.display = 'block';
                    requestAnimationFrame(scrollToHash);
                }
            }
        }
    </script>
</body>
</html>
